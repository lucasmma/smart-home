# =============================================================================
#  Dozzle — real-time Docker log viewer (stateless)
#
#  Docs:  docs/dozzle.md
#  Streams live container logs to a web UI by reading the Docker socket.
#
#  SECURITY: the Docker socket is mounted READ-ONLY. Even so, socket access is
#  powerful — keep Dozzle on the LAN only, never expose it to the internet.
# =============================================================================

services:
  dozzle:
    image: amir20/dozzle:${DOZZLE_VERSION:-latest}
    container_name: dozzle
    hostname: dozzle
    restart: unless-stopped

    environment:
      TZ: ${TZ}
      DOZZLE_NO_ANALYTICS: "true"
      # Optional built-in auth — uncomment to require a login (see docs).
      # DOZZLE_AUTH_PROVIDER: "simple"

    volumes:
      # Read-only socket: Dozzle only needs to read logs, not control Docker.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Uncomment if you enable simple auth:
      # - ${DATA_ROOT}/configs/dozzle/users.yml:/data/users.yml:ro

    ports:
      - "8082:8080"

    networks:
      - homelab

    security_opt:
      - no-new-privileges:true

    mem_limit: 128m

    # Dozzle ships a self-check subcommand.
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab:
    external: true
    name: homelab
