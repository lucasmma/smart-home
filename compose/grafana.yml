# =============================================================================
#  Grafana — dashboards & visualization
#
#  Docs:  docs/grafana.md
#  Auto-provisions the Prometheus datasource and dashboards from config files
#  (no manual imports). Queries Prometheus at http://prometheus:9090.
# =============================================================================

services:
  grafana:
    image: grafana/grafana-oss:${GRAFANA_VERSION:-latest}
    container_name: grafana
    hostname: grafana
    restart: unless-stopped

    # Grafana's image runs as uid 472. The bind-mounted data dir must be owned
    # by 472:472 (install.sh handles this).
    user: "472:472"

    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Lock it down: no public sign-up, no anonymous access.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Kill phone-home / update nag / news feed (privacy + a little RAM).
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_LOG_LEVEL: "warn"
      # External URL used in generated links (e.g. alert notifications) so they
      # point at the Pi, not localhost.
      GF_SERVER_ROOT_URL: "http://${SERVER_IP}:3000"
      # Pushover secrets for provisioned alerting (referenced as ${...} in
      # configs/grafana/provisioning/alerting/contactpoints.yaml).
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY}

    volumes:
      - ${DATA_ROOT}/volumes/grafana/data:/var/lib/grafana
      - ${DATA_ROOT}/configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DATA_ROOT}/configs/grafana/dashboards:/var/lib/grafana/dashboards:ro

    ports:
      - "3000:3000"

    networks:
      - homelab

    depends_on:
      - prometheus

    security_opt:
      - no-new-privileges:true

    # Grafana v13 needs real headroom: 256m never finishes first-boot DB
    # migrations, and 512m proved too tight in practice — steady-state it pinned
    # memory.current at the 512m cap with ~36M file-page refaults and
    # memory.pressure ~44%, thrashing its code pages off disk (~300 MB/s reads)
    # and taking the whole box down. 768m holds the working set resident.
    mem_limit: 768m

    healthcheck:
      # Use 127.0.0.1 (not localhost) — localhost resolves to IPv6 [::1] but
      # Grafana listens on IPv4, which would make the probe a false negative.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab:
    external: true
    name: homelab
