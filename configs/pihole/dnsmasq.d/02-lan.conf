# Custom dnsmasq records for Pi-hole (mounted read-only at /etc/dnsmasq.d).
#
# Use this to resolve your home-server's service hostnames on the LAN, so you
# can reach them by name instead of by port number once a reverse proxy exists.
#
# Uncomment and set SERVER_IP once you know it. Example:
#
#   address=/home.lan/192.168.1.10
#   address=/pihole.home.lan/192.168.1.10
#
# The line below is a harmless no-op comment until you add records.
# (Pi-hole reads every *.conf in this directory on startup.)
