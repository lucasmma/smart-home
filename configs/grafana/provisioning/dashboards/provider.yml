# Auto-provisions every *.json under /var/lib/grafana/dashboards into a
# "Home Server" folder. Drop new JSON files there and they appear on reload.
apiVersion: 1

providers:
  - name: home-server
    orgId: 1
    folder: "Home Server"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
