# Homepage global settings. Docs: https://gethomepage.dev/configs/settings/
title: Home Server
theme: dark
color: slate
headerStyle: clean
# Group layout: which order and how each group renders.
layout:
  Networking:
    style: row
    columns: 3
  Monitoring:
    style: row
    columns: 4
  Logging:
    style: row
    columns: 3
  Internet:
    style: row
    columns: 3
