; =============================================================================
;  Homelab Companion — ESP32 DevKit V1 + SSD1306 128x64 OLED (I2C)
;
;  Build (debug, DEBUG logs on):   pio run
;  Build (release, DEBUG stripped): pio run -e esp32-release
;  Upload + monitor:                pio run -t upload && pio device monitor
; =============================================================================

[platformio]
default_envs = esp32-debug
; Secrets (WiFi creds, API host/token) live in a git-ignored secrets.ini —
; the firmware's ".env". Copy the template before your first build:
;     cp secrets.ini.example secrets.ini   (then edit it)
extra_configs = secrets.ini

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

lib_deps =
	olikraus/U8g2@^2.35.19
	bblanchon/ArduinoJson@^7.2.0

build_flags =
	${secrets.build_flags}
	-D FW_VERSION=\"1.0.0\"
	-Wall

; --- Debug: full logging incl. DEBUG level ---
[env:esp32-debug]
build_type = debug

; --- Release: DEBUG logs compiled out ---
[env:esp32-release]
build_flags =
	${env.build_flags}
	-D RELEASE
